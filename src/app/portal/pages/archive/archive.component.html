<div class="container-main section-padding">
    <div class="mb-6 sm:mb-8 flex flex-col gap-4 sm:gap-6 lg:flex-row lg:items-end lg:justify-between">
        <div>
            <h1 class="text-2xl sm:text-3xl font-bold text-text-main mb-2">Talks Archive</h1>
            <p class="text-sm sm:text-base text-text-muted">Browse past talks.</p>
        </div>

        <div
            class="flex w-full sm:w-auto flex-wrap items-center justify-between sm:justify-start gap-3 text-sm text-text-muted">
            <span class="rounded-full border border-border bg-surface-card px-3 py-1.5">
                {{ filteredSeminars.length }} talk{{ filteredSeminars.length === 1 ? '' : 's' }}
            </span>
            <button type="button" (click)="toggleFilterControls()" class="btn btn-outline text-sm">
                {{ showFilterControls ? 'Hide filters' : 'Filter' }}
            </button>
        </div>
    </div>

    <div class="relative transition-all duration-300 ease-out" [class.mb-8]="showFilterControls"
        [class.mb-0]="!showFilterControls" [class.overflow-visible]="showFilterControls"
        [class.overflow-hidden]="!showFilterControls" [ngClass]="{
            'max-h-[420px] opacity-100 pointer-events-auto': showFilterControls,
            'max-h-0 opacity-0 pointer-events-none': !showFilterControls
        }" [attr.aria-hidden]="!showFilterControls">
        <div class="relative z-30 rounded-2xl bg-surface-card p-3 sm:p-4">
            <div class="grid gap-3 lg:grid-cols-[minmax(0,1.6fr)_minmax(0,1fr)_minmax(0,1fr)_auto]">
                <app-text-filter placeholder="Search title, abstract, speaker, tag, or location..."
                    (filterChange)="onSearchChange($event)"></app-text-filter>

                <details #filterMenu class="relative group">
                    <summary
                        class="input-field h-[46px] flex items-center justify-between cursor-pointer list-none select-none">
                        <span class="truncate text-sm text-text-main">{{ getTagSummary() }}</span>
                        <svg class="w-4 h-4 text-text-faint group-open:rotate-180 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m6 9 6 6 6-6" />
                        </svg>
                    </summary>
                    <div
                        class="absolute left-0 right-0 top-full z-[70] mt-2 w-full max-h-[50vh] sm:max-h-64 overflow-auto rounded-xl border border-border bg-surface-card shadow-lg p-2 space-y-1">
                        <button type="button" *ngFor="let tag of availableTags" (click)="toggleTag(tag.id)"
                            class="w-full rounded-lg px-3 py-2 text-left text-sm flex items-center justify-between hover:bg-surface-muted transition-colors">
                            <span class="truncate">{{ tag.name }}</span>
                            <span *ngIf="selectedTagIds.includes(tag.id)"
                                class="text-primary text-xs font-semibold">Selected</span>
                        </button>
                    </div>
                </details>

                <details #filterMenu class="relative group">
                    <summary
                        class="input-field h-[46px] flex items-center justify-between cursor-pointer list-none select-none">
                        <span class="truncate text-sm text-text-main">{{ getSpeakerSummary() }}</span>
                        <svg class="w-4 h-4 text-text-faint group-open:rotate-180 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m6 9 6 6 6-6" />
                        </svg>
                    </summary>
                    <div
                        class="absolute left-0 right-0 top-full z-[70] mt-2 w-full max-h-[50vh] sm:max-h-64 overflow-auto rounded-xl border border-border bg-surface-card shadow-lg p-2 space-y-1">
                        <button type="button" *ngFor="let speaker of availableSpeakers"
                            (click)="toggleSpeaker(speaker.id)"
                            class="w-full rounded-lg px-3 py-2 text-left text-sm flex items-center justify-between hover:bg-surface-muted transition-colors">
                            <span class="truncate">{{ speaker.name }}</span>
                            <span *ngIf="selectedSpeakerIds.includes(speaker.id)"
                                class="text-primary text-xs font-semibold">Selected</span>
                        </button>
                    </div>
                </details>

                <button type="button" (click)="clearFilters()" [disabled]="!hasActiveFilters"
                    class="btn btn-outline text-sm h-[46px] w-full sm:w-auto lg:justify-self-end disabled:opacity-50 disabled:cursor-not-allowed">
                    Clear filters
                </button>
            </div>
        </div>
    </div>

    <app-paginated-grid [data]="filteredSeminars" [loading]="loading" [itemTemplate]="seminarTmpl"
        [skeletonTemplate]="skeletonTmpl"
        [emptyMessage]="hasActiveFilters ? 'No talks match the current filters.' : 'No past seminars found.'"
        [showPagination]="false">
        <ng-template #seminarTmpl let-sem>
            <app-seminar-card [seminar]="sem"></app-seminar-card>
        </ng-template>

        <ng-template #skeletonTmpl>
            <app-skeleton-card *ngFor="let i of [1,2,3,4,5,6]"></app-skeleton-card>
        </ng-template>
    </app-paginated-grid>
</div>
